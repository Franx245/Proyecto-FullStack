<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="dns-prefetch" href="https://images.ygoprodeck.com" />
    <link rel="preconnect" href="https://images.ygoprodeck.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@300;400;500;700&display=optional"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@300;400;500;700&display=optional"
      />
    </noscript>

    <!-- 📱 Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🧠 SEO -->
    <title>RareHunter | Tienda de Yu-Gi-Oh! en Argentina</title>
    <meta
      name="description"
      content="Compra cartas Yu-Gi-Oh, productos sellados y accesorios. Envíos a todo Argentina."
    />

    <!-- 🎨 Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- 🔗 Open Graph -->
    <meta property="og:title" content="RareHunter | Yu-Gi-Oh Marketplace" />
    <meta
      property="og:description"
      content="Comprá cartas Yu-Gi-Oh al mejor precio en Argentina."
    />
    <meta property="og:image" content="/icon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://duelvault-store-api.vercel.app" />

    <!-- 🐦 Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RareHunter" />
    <meta
      name="twitter:description"
      content="Tu marketplace de Yu-Gi-Oh en Argentina"
    />
    <meta name="twitter:image" content="/icon.svg" />

    <!-- 📦 PWA -->
    <link rel="manifest" href="/manifest.json" />

    <style>
      :root {
        color-scheme: dark;
        --boot-bg: #0b1120;
        --boot-fg: #e2e8f0;
        --boot-body: "Space Grotesk", system-ui, sans-serif;
        --boot-display: "Rajdhani", system-ui, sans-serif;
      }

      html {
        min-height: 100%;
        background: var(--boot-bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.12), transparent 30%),
          linear-gradient(180deg, #04070c 0%, #0b1120 100%);
        color: var(--boot-fg);
        font-family: var(--boot-body);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #root {
        min-height: 100vh;
      }

      .font-display {
        font-family: var(--boot-display);
      }
    </style>

    <script>
      (function () {
        var PERSISTED_QUERY_KEY = "duelvault-react-query-cache";
        var path = window.location.pathname || "";
        if (!path.startsWith("/singles")) {
          return;
        }

        var category = decodeURIComponent(path.split("/")[2] || "").trim();
        var params = new URLSearchParams({ page: "1", pageSize: "24" });
        if (category) {
          params.set("category", category);
        }

        var cloudName = "%VITE_CLOUDINARY_CLOUD_NAME%";
        var apiBase = "%VITE_API_BASE_URL%" || "https://proyecto-fullstack-production-8fe1.up.railway.app";
        var apiUrl = apiBase + "/api/cards?" + params.toString();
        var readPersistedCatalog = function () {
          try {
            var raw = window.localStorage.getItem(PERSISTED_QUERY_KEY);
            if (!raw) {
              return null;
            }

            var persisted = JSON.parse(raw);
            var queries = persisted && persisted.clientState && Array.isArray(persisted.clientState.queries)
              ? persisted.clientState.queries
              : [];

            for (var index = 0; index < queries.length; index += 1) {
              var entry = queries[index];
              var queryKey = entry && Array.isArray(entry.queryKey) ? entry.queryKey : [];
              var state = entry && entry.state ? entry.state : null;
              var queryState = queryKey[1] || null;
              var data = state && state.data ? state.data : null;

              if (
                queryKey[0] === "cards" &&
                queryState &&
                queryState.page === 1 &&
                (queryState.pageSize || 24) === 24 &&
                (queryState.search || "") === "" &&
                (queryState.category || "") === category &&
                data &&
                Array.isArray(data.cards)
              ) {
                return data;
              }
            }
          } catch {
            return null;
          }

          return null;
        };
        var warmFirstCardImage = function (payload) {
          var firstCard = payload && Array.isArray(payload.cards) ? payload.cards[0] : null;
          var rawId = firstCard && (firstCard.ygopro_id || firstCard.id);
          if (!rawId) {
            return;
          }

          var remoteSrc = "https://images.ygoprodeck.com/images/cards_small/" + rawId + ".jpg";
          var imageHref = cloudName
            ? "https://res.cloudinary.com/" + cloudName + "/image/fetch/w_240,q_auto,f_auto,dpr_auto/" + remoteSrc
            : remoteSrc;

          var preloadImage = new Image();
          preloadImage.decoding = "sync";
          preloadImage.loading = "eager";
          preloadImage.fetchPriority = "high";
          preloadImage.src = imageHref;
        };

        var persistedPayload = readPersistedCatalog();
        if (persistedPayload) {
          warmFirstCardImage(persistedPayload);
          window.__DUELVAULT_INITIAL_CATALOG__ = {
            category: category,
            promise: Promise.resolve(persistedPayload),
            payload: persistedPayload,
          };
          return;
        }

        var bootstrapPromise = fetch(apiUrl, { credentials: "same-origin", priority: "high" })
          .then(function (response) {
            if (!response.ok) {
              return null;
            }

            return response.json();
          })
          .then(function (payload) {
            if (payload) {
              warmFirstCardImage(payload);
            }

            return payload;
          })
          .catch(function () {
            return null;
          });

        window.__DUELVAULT_INITIAL_CATALOG__ = {
          category: category,
          promise: bootstrapPromise,
          payload: null,
        };

        bootstrapPromise.then(function (payload) {
          if (window.__DUELVAULT_INITIAL_CATALOG__) {
            window.__DUELVAULT_INITIAL_CATALOG__.payload = payload;
          }
        });
      })();
    </script>

    <script>
      (function () {
        if (window.location.pathname !== "/" && window.location.pathname !== "") return;
        var cloudName = "%VITE_CLOUDINARY_CLOUD_NAME%";
        var featuredApiBase = "%VITE_API_BASE_URL%" || "https://proyecto-fullstack-production-8fe1.up.railway.app";
        fetch(featuredApiBase + "/api/catalog?featured=true&page=1&pageSize=5", { priority: "high" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (payload) {
            var cards = payload && Array.isArray(payload.cards) ? payload.cards : [];
            if (!cards.length) return;
            window.__DUELVAULT_FEATURED_BOOTSTRAP__ = cards;
            var first = cards[0];
            var rawId = first && (first.ygopro_id || first.id);
            if (!rawId) return;
            var remoteSrc = "https://images.ygoprodeck.com/images/cards_small/" + rawId + ".jpg";
            var href = cloudName
              ? "https://res.cloudinary.com/" + cloudName + "/image/fetch/w_240,q_auto,f_auto/" + remoteSrc
              : remoteSrc;
            var img = new Image();
            img.fetchPriority = "high";
            img.src = href;
          })
          .catch(function () {});
      })();
    </script>

  </head>

  <body>
    <div id="root"></div>

    <!-- ⚡ Vite entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
