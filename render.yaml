services:
  - type: web
    name: duelvault-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://duelvault-store-api.vercel.app
      - key: BACKEND_URL
        sync: false
      - key: ADMIN_URL
        value: https://duelvault-admin.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://duelvault-store-api.vercel.app,https://duelvault-admin.vercel.app
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
